<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RHSOFT Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #9CD5FF; /* fondo claro */
    }
  </style>
</head>
<body class="flex min-h-screen">

  <!-- Sidebar -->
  <nav class="bg-[#355872] text-[#F7F8F0] w-64 p-6 flex flex-col">
    <h2 class="text-2xl font-bold mb-8">RHSOFT Admin</h2>
    <ul class="flex flex-col gap-4 text-lg">
      <li class="hover:bg-[#7AACCE] rounded px-4 py-2 cursor-pointer transition">
        Reclutamiento
      </li>
      <li class="hover:bg-[#7AACCE] rounded px-4 py-2 cursor-pointer transition">
        Selección
      </li>
      <li class="hover:bg-[#7AACCE] rounded px-4 py-2 cursor-pointer transition">
        Registro / Salida
      </li>
    </ul>
  </nav>

  <!-- Main content -->
  <main class="flex-1 p-8">
    <!-- Header -->
    <header class="bg-[#355872] text-[#F7F8F0] p-6 rounded mb-8 shadow-md">
      <h1 class="text-3xl font-bold">Bienvenido a RHSOFT Admin</h1>
      <p class="mt-2">Selecciona una opción del menú lateral para empezar</p>
    </header>

    <!-- Aquí iría el contenido dinámico según sección seleccionada -->
    <section class="bg-white rounded shadow p-6">
      <p class="text-[#355872] font-semibold">Contenido del panel aparecerá aquí.</p>
    </section>
  </main>

</body>
</html>
